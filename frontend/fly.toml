app = "magnetite-frontend"
primary_region = "jnb"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
dockerfile = "Dockerfile.fly.frontend"

[env]
NEXT_PUBLIC_API_URL = "https://magnetite.fly.dev"

[http_service]
internal_port = 80
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1

[autoscaling]
min_machines_running = 0
max_machines_running = 3
