version: "3.9"

services:
  # Only applies when the optional `media` profile is started.
  mediamtx:
    profiles: ["media"]
    environment:
      MTX_LOGLEVEL: debug
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: builder
    command: cargo run
    environment:
      RUST_LOG: debug
      DATABASE_URL: postgres://magnetite:magnetite_dev_password@postgres:5432/magnetite
      REDIS_URL: redis://redis:6379
      # Offline-by-default dev: mock rail + builtin comms need no external service.
      PAYMENT_RAIL: mock
      COMMS_PROVIDER: builtin
    volumes:
      - ./backend:/app
      - cargo_cache:/app/target
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: builder
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./package.json:/app/package.json
      - ./vite.config.js:/app/vite.config.js
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

  postgres:
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  mailhog:
    ports:
      - "1025:1025"
      - "8025:8025"

  pgadmin:
    ports:
      - "5050:80"

volumes:
  cargo_cache:
  node_modules:
