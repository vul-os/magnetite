# Backend — Axum REST API server (/api/v1/*)
# Image: ghcr.io/magnetite/backend:latest
#   Build: Dockerfile.backend (target: runtime)
#   Binary: /usr/local/bin/magnetite-backend
#   Port: 8080
#   Health: GET /health → 200
#
# This Deployment is paired with an HPA (09-hpa.yaml) that scales based on CPU.
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: magnetite
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: magnetite
  labels:
    app: backend
  annotations:
    # Instruct Argo CD / Flux to wait for a successful rollout.
    deployment.kubernetes.io/revision: "1"
spec:
  # Initial replica count; HPA (09-hpa.yaml) takes over after the first scale.
  replicas: 2
  selector:
    matchLabels:
      app: backend
  # Rolling update: never take more than 1 pod down; bring up 1 new before removing old.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 60
      # Wait for Postgres and Redis to be ready before starting.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."; sleep 2;
              done
      containers:
        - name: backend
          image: ghcr.io/magnetite/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: magnetite-config
          env:
            # Sensitive vars sourced from Secret.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: JWT_SECRET
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: RESEND_API_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: DISCORD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: DISCORD_CLIENT_ID
            - name: DISCORD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: DISCORD_CLIENT_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: GITLAB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: GITLAB_CLIENT_ID
            - name: GITLAB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: GITLAB_CLIENT_SECRET
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: GITHUB_APP_ID
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: GITHUB_APP_PRIVATE_KEY
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: magnetite-secrets
                  key: GITHUB_WEBHOOK_SECRET
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Graceful shutdown: let in-flight requests drain before exit.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
