# Horizontal Pod Autoscalers for backend and magnetite-runtime.
# Requires metrics-server to be installed in the cluster:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#
# For advanced session-based scaling of the runtime (scale on active_sessions /
# connected_clients), deploy KEDA (https://keda.sh) and replace the runtime HPA
# with a ScaledObject pointing at a Prometheus metric. See docs/self-hosting/deploy.md §scaling.
---
# Backend HPA — scales on CPU utilization.
# Target: keep average CPU at or below 70% across all backend pods.
# Range: 2–10 replicas.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: magnetite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
# Runtime HPA — scales on CPU utilization.
# Each runtime Pod can host multiple SharedRoom sessions; scale out when CPU is hot.
# Range: 1–20 replicas.
#
# NOTE: Recreate strategy means a scale-down will drop active WebSocket connections.
# Increase minReplicas in production to reduce churn, or implement graceful
# session migration before relying on aggressive scale-down.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: magnetite-runtime
  namespace: magnetite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: magnetite-runtime
  minReplicas: 1
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      # Long stabilization window to avoid dropping active game sessions.
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
