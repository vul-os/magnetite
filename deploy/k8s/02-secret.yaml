# Secret template — values are base64-encoded placeholders.
# Replace CHANGE_ME values before applying, or use a secrets manager
# (Vault, Sealed Secrets, AWS Secrets Manager + External Secrets Operator).
#
# Generate base64: echo -n "value" | base64
#
# NEVER commit real secrets to source control.
apiVersion: v1
kind: Secret
metadata:
  name: magnetite-secrets
  namespace: magnetite
type: Opaque
data:
  # Required — must be at least 32 bytes in production.
  # echo -n "your-32+-char-jwt-secret" | base64
  JWT_SECRET: "Q0hBTkdFX01FX0pXVF9TRUNSRVRfQVRfTEVBU1RfMzJfQ0hBUlM="

  # PostgreSQL connection string.
  # echo -n "postgres://magnetite:password@postgres:5432/magnetite" | base64
  DATABASE_URL: "Q0hBTkdFX01FX0RBVEFCQVNFX1VSTF9QT1NUR1JFU0w="

  # NOTE: there are no payment-processor secrets. Settlement is non-custodial
  # (DECENTRALIZATION.md §3.6): buyers pay sellers wallet-to-wallet on the
  # configured PAYMENT_RAIL and the signed receipt is the entitlement. The
  # default rail (`mock`) needs no credentials at all.

  # Resend API key — required for transactional email.
  # echo -n "re_..." | base64
  RESEND_API_KEY: "Q0hBTkdFX01FX1JFU0VORF9LRVk="

  # MediaMTX admin API key — only if THIS node hosts media (optional).
  # echo -n "..." | base64
  MEDIA_SERVER_API_KEY: "Q0hBTkdFX01FX01FRElBX0tFWQ=="

  # OAuth provider keys — leave empty ("") if unused.
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  DISCORD_CLIENT_ID: ""
  DISCORD_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GITLAB_CLIENT_ID: ""
  GITLAB_CLIENT_SECRET: ""

  # GitHub App (for game repository integration).
  GITHUB_APP_ID: ""
  GITHUB_APP_PRIVATE_KEY: ""
  GITHUB_WEBHOOK_SECRET: ""

  # Build runner bearer token — used by wasm-build-runner.sh.
  BUILD_RUNNER_TOKEN: "Q0hBTkdFX01FX0JVSUxEX1JVTk5FUl9UT0tFTg=="
