<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Developer Integration</title>
  <desc>Developer tools with code terminal and GitHub integration</desc>

  <defs>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="terminalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="#0a0a0f"/>

  <g id="terminal" transform="translate(100, 80)">
    <rect x="0" y="0" width="500" height="320" rx="12" fill="#1a1a24"/>
    <rect x="4" y="4" width="492" height="30" rx="8" fill="#252530"/>

    <circle cx="25" cy="19" r="6" fill="#ef4444"/>
    <circle cx="45" cy="19" r="6" fill="#f59e0b"/>
    <circle cx="65" cy="19" r="6" fill="#22c55e"/>

    <rect x="4" y="34" width="492" height="282" rx="0" fill="url(#terminalGrad)"/>

    <g transform="translate(20, 60)">
      <text fill="#22c55e" font-family="monospace" font-size="14">
        <tspan x="0" y="0">$ magnetite init</tspan>
        <tspan x="0" y="25">✓ Project initialized</tspan>
        <tspan x="0" y="50">$ npm install @magnetite/sdk</tspan>
        <tspan x="0" y="75">✓ SDK installed</tspan>
        <tspan x="0" y="100">$ magnetite deploy --network polygon</tspan>
        <tspan x="0" y="125" fill="#f59e0b">⚡ Deploying smart contract...</tspan>
        <tspan x="0" y="150" fill="#22c55e">✓ Contract deployed: 0x7a2...</tspan>
        <tspan x="0" y="175" fill="#888">$</tspan>
      </text>

      <rect x="40" y="180" width="8" height="16" fill="#f59e0b">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <rect x="0" y="0" width="500" height="320" rx="12" fill="none" stroke="url(#devGrad)" stroke-width="2"/>
  </g>

  <g id="github-card" transform="translate(520, 120)">
    <rect x="0" y="0" width="220" height="180" rx="12" fill="#1a1a24"/>
    <rect x="0" y="0" width="220" height="180" rx="12" fill="none" stroke="#252530" stroke-width="1"/>

    <g transform="translate(20, 25)">
      <rect x="0" y="0" width="180" height="50" rx="6" fill="#252530"/>
      <text x="15" y="20" fill="#f59e0b" font-size="11" font-weight="bold">magnetite-sdk</text>
      <text x="15" y="38" fill="#888" font-size="10">Gaming SDK for Web3</text>
      <circle cx="160" cy="25" r="10" fill="#f59e0b"/>
      <text x="160" y="29" text-anchor="middle" fill="#0a0a0f" font-size="10">★</text>
    </g>

    <g transform="translate(20, 90)">
      <rect x="0" y="0" width="60" height="24" rx="4" fill="#f59e0b" opacity="0.2"/>
      <text x="30" y="16" text-anchor="middle" fill="#f59e0b" font-size="10">TypeScript</text>
    </g>

    <g transform="translate(90, 90)">
      <rect x="0" y="0" width="50" height="24" rx="4" fill="#22c55e" opacity="0.2"/>
      <text x="25" y="16" text-anchor="middle" fill="#22c55e" font-size="10">MIT</text>
    </g>

    <rect x="20" y="130" width="180" height="35" rx="6" fill="#252530"/>
    <text x="110" y="152" text-anchor="middle" fill="#f59e0b" font-size="11">View on GitHub →</text>
  </g>

  <g id="gaming-elements" transform="translate(200, 420)">
    <rect x="0" y="0" width="400" height="60" rx="10" fill="#1a1a24"/>

    <g transform="translate(50, 15)">
      <circle cx="15" cy="15" r="14" fill="#f59e0b"/>
      <circle cx="15" cy="15" r="9" fill="#0a0a0f"/>
      <circle cx="15" cy="15" r="3" fill="#f59e0b"/>
    </g>

    <g transform="translate(120, 12)">
      <rect x="0" y="0" width="35" height="26" rx="4" fill="#ea580c"/>
      <text x="17" y="18" text-anchor="middle" fill="#0a0a0f" font-size="10" font-weight="bold">USDC</text>
    </g>

    <g transform="translate(190, 10)">
      <rect x="0" y="0" width="40" height="25" rx="4" fill="#252530" stroke="#f59e0b" stroke-width="1"/>
      <text x="20" y="16" text-anchor="middle" fill="#f59e0b" font-size="9">API</text>
    </g>

    <g transform="translate(260, 12)">
      <rect x="0" y="0" width="50" height="26" rx="4" fill="#252530" stroke="#ea580c" stroke-width="1"/>
      <text x="25" y="16" text-anchor="middle" fill="#ea580c" font-size="9">SDK</text>
    </g>

    <g transform="translate(340, 10)">
      <rect x="0" y="0" width="35" height="25" rx="12.5" fill="#f59e0b"/>
      <text x="17" y="17" text-anchor="middle" fill="#0a0a0f" font-size="12" font-weight="bold">⚡</text>
    </g>
  </g>
</svg>