<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <title>Magnetite Icon</title>
  <desc>Magnetic icon inspired by iron oxide structure</desc>

  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="iconGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" fill="#0a0a0f"/>

  <g transform="translate(100, 100)">
    <circle cx="0" cy="-50" r="28" fill="url(#iconGrad)" filter="url(#iconGlow)"/>
    <circle cx="0" cy="-50" r="20" fill="#0a0a0f"/>
    <circle cx="0" cy="-50" r="12" fill="url(#iconGrad)"/>

    <circle cx="0" cy="50" r="28" fill="url(#iconGrad2)" filter="url(#iconGlow)"/>
    <circle cx="0" cy="50" r="20" fill="#0a0a0f"/>
    <circle cx="0" cy="50" r="12" fill="url(#iconGrad2)"/>

    <rect x="-8" y="-35" width="16" height="70" rx="3" fill="#252530"/>

    <g transform="translate(-45, 0)">
      <rect x="0" y="-35" width="10" height="70" rx="2" fill="#f59e0b" opacity="0.3"/>
      <line x1="5" y1="-30" x2="5" y2="30" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    </g>

    <g transform="translate(35, 0)">
      <rect x="0" y="-35" width="10" height="70" rx="2" fill="#ea580c" opacity="0.3"/>
      <line x1="5" y1="-30" x2="5" y2="30" stroke="#ea580c" stroke-width="1" opacity="0.5"/>
    </g>

    <circle cx="-60" cy="-25" r="5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="60" cy="25" r="5" fill="#ea580c" opacity="0.6"/>
    <circle cx="-50" cy="40" r="3" fill="#f59e0b" opacity="0.4"/>
    <circle cx="50" cy="-40" r="3" fill="#ea580c" opacity="0.4"/>
  </g>

  <g opacity="0.15">
    <line x1="30" y1="30" x2="70" y2="50" stroke="#f59e0b" stroke-width="1"/>
    <line x1="170" y1="30" x2="130" y2="50" stroke="#ea580c" stroke-width="1"/>
    <line x1="30" y1="170" x2="70" y2="150" stroke="#f59e0b" stroke-width="1"/>
    <line x1="170" y1="170" x2="130" y2="150" stroke="#ea580c" stroke-width="1"/>
  </g>
</svg>