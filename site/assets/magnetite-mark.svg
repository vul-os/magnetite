<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="magnetite">
  <!-- magnetite mark — "Lodestone".
       An octahedral crystal (magnetite's natural habit) cut by a field arc.
       The crystal outline uses a mid slate that reads on both light and dark
       surfaces; the field arc and core carry the brand violet. The core dot is
       the authoritative host: everything resolves through one point. -->
  <defs>
    <linearGradient id="mg-field" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0"   stop-color="#8B74FF" stop-opacity=".3"/>
      <stop offset=".55" stop-color="#7B61FF" stop-opacity=".85"/>
      <stop offset="1"   stop-color="#5B3FE0" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Octahedral crystal -->
  <path d="M100 18 L172 100 L100 182 L28 100 Z"
        fill="none" stroke="#6E7488" stroke-width="14" stroke-linejoin="round"/>

  <!-- Internal cleavage planes -->
  <g stroke="#6E7488" stroke-width="8" stroke-linecap="round" opacity=".35">
    <path d="M100 18 V182"/>
    <path d="M28 100 H172"/>
  </g>

  <!-- Field lines sweeping through the stone -->
  <path d="M40 138 Q100 92 160 138" fill="none" stroke="url(#mg-field)"
        stroke-width="11" stroke-linecap="round" opacity=".45"/>
  <path d="M46 128 Q100 78 154 128" fill="none" stroke="url(#mg-field)"
        stroke-width="16" stroke-linecap="round"/>

  <!-- The authoritative core -->
  <circle cx="100" cy="100" r="19" fill="#5B3FE0"/>
  <circle cx="100" cy="100" r="7"  fill="#EDE8FF"/>
</svg>
