<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magnetite docs</title>
<meta name="description" content="Magnetite documentation — architecture, hosting, payments, comms.">
<link rel="icon" href="./assets/magnetite-logo.svg">
<style>*,*::before,*::after{box-sizing:border-box}
:root{
  --bg:#08090c; --bg-soft:#0c0d12; --panel:#111319; --panel-2:#15171f;
  --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.12);
  --text:#e7e9ee; --muted:#9aa1b1; --faint:#6b7280;
  --radius:16px; --max:1120px;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;font-size:16px}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:
  radial-gradient(1100px 600px at 80% -10%, color-mix(in srgb,var(--accent) 20%, transparent), transparent 60%),
  radial-gradient(900px 500px at -10% 10%, color-mix(in srgb,var(--accent-2) 14%, transparent), transparent 55%),
  var(--bg);}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
.accent{color:var(--accent)}

/* Header */
.site-header{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:color-mix(in srgb,var(--bg) 72%, transparent);border-bottom:1px solid var(--border)}
.nav{display:flex;align-items:center;gap:18px;height:64px}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;letter-spacing:-.02em}
.brand .tile{width:34px;height:34px;border-radius:9px;background:#0c0d12;display:grid;place-items:center;padding:5px;box-shadow:0 1px 0 rgba(255,255,255,.08) inset, 0 4px 14px rgba(0,0,0,.5);border:1px solid var(--border-2)}
.brand .tile img,.brand .tile svg{width:100%;height:100%;object-fit:contain}
.nav-spacer{flex:1}
.nav-links{display:flex;align-items:center;gap:22px}
.nav-links a{color:var(--muted);font-size:14.5px;font-weight:500;transition:color .15s}
.nav-links a:hover{color:var(--text)}
.vulos-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--border-2);border-radius:999px;font-size:13px;color:var(--muted);transition:border-color .15s,color .15s}
.vulos-badge:hover{border-color:var(--accent);color:var(--text)}
.vulos-badge img{width:16px;height:16px;border-radius:4px}
@media(max-width:760px){.nav-links{display:none}}

/* Docs viewer */
.docs-shell{display:grid;grid-template-columns:248px 1fr;gap:36px;align-items:start;padding:34px 0 70px}
@media(max-width:860px){.docs-shell{grid-template-columns:1fr}}
.docs-nav{position:sticky;top:84px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel);padding:14px}
.docs-nav .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);padding:6px 10px}
.docs-nav a{display:block;padding:8px 11px;border-radius:9px;color:var(--muted);font-size:14.5px;font-weight:500;transition:.15s}
.docs-nav a:hover{background:rgba(255,255,255,.04);color:var(--text)}
.docs-nav a.active{background:color-mix(in srgb,var(--accent) 16%, transparent);color:var(--text)}
@media(max-width:860px){.docs-nav{position:static}}
.docs-main{min-width:0}
.markdown{font-size:16px}
.markdown>*:first-child{margin-top:0}
.markdown h1{font-size:34px;letter-spacing:-.03em;margin:.2em 0 .5em;border-bottom:1px solid var(--border);padding-bottom:.3em}
.markdown h2{font-size:25px;letter-spacing:-.02em;margin:1.6em 0 .6em;border-bottom:1px solid var(--border);padding-bottom:.25em}
.markdown h3{font-size:19px;margin:1.4em 0 .5em}
.markdown h4{font-size:16px;margin:1.3em 0 .4em;color:var(--text)}
.markdown p,.markdown li{color:#cfd3dd}
.markdown a{color:var(--accent);text-decoration:none}
.markdown a:hover{text-decoration:underline}
.markdown code{font-family:var(--mono);font-size:.88em;background:rgba(255,255,255,.07);padding:2px 6px;border-radius:6px}
.markdown pre{background:#0a0b10;border:1px solid var(--border-2);border-radius:12px;padding:16px 18px;overflow:auto}
.markdown pre code{background:none;padding:0;font-size:13.5px;line-height:1.7;color:#cbd5e1}
.markdown blockquote{margin:1em 0;padding:.4em 1em;border-left:3px solid var(--accent);background:rgba(255,255,255,.03);color:var(--muted);border-radius:0 8px 8px 0}
.markdown table{border-collapse:collapse;width:100%;margin:1.2em 0;font-size:14.5px;display:block;overflow:auto}
.markdown th,.markdown td{border:1px solid var(--border-2);padding:9px 12px;text-align:left}
.markdown th{background:var(--panel);font-weight:600}
.markdown img{border-radius:10px;margin:1em 0;border:1px solid var(--border)}
.markdown hr{border:none;border-top:1px solid var(--border);margin:2em 0}
.markdown .mermaid{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin:1.2em 0;text-align:center;overflow:auto}
.docs-title{font-size:13px;color:var(--faint);margin-bottom:6px}
.docs-error{color:#fca5a5;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);padding:14px 16px;border-radius:10px}

/* Footer */
.site-footer{border-top:1px solid var(--border);margin-top:40px;padding:40px 0}
.foot{display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between}
.foot .left{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px}
.foot .left img{width:20px;height:20px;border-radius:5px}
.foot .links{display:flex;gap:20px;flex-wrap:wrap}
.foot .links a{color:var(--muted);font-size:14px}
.foot .links a:hover{color:var(--text)}
</style>
<style>:root{--accent:#7b61ff;--accent-2:#ff4d9d}</style>
<script src="./assets/vendor/marked.umd.js"></script>
<script src="./assets/vendor/mermaid.min.js"></script>
</head>
<body>
<header class="site-header"><div class="wrap nav">
    <a class="brand" href="./index.html"><span class="tile"><img src="./assets/magnetite-logo.svg" alt="Magnetite logo"></span>magnetite</a>
    <div class="nav-spacer"></div>
    <nav class="nav-links">
      <a href="./index.html#features">Features</a>
      <a href="./docs.html">Docs</a>
      <a href="https://github.com/vul-os/magnetite" target="_blank" rel="noopener">GitHub</a>
    </nav>
    <a class="vulos-badge" href="https://vulos.org" target="_blank" rel="noopener" title="Part of Vulos">
      <img src="./assets/vulos-logo.png" alt="Vulos">Part of Vulos
    </a>
  </div></header>
<div class="wrap docs-shell">
  <aside class="docs-nav">
    <div class="label">magnetite docs</div>
        <a data-slug="overview" href="#overview">Overview</a>
        <a data-slug="getting-started" href="#getting-started">Getting started</a>
        <a data-slug="architecture" href="#architecture">Architecture</a>
        <a data-slug="hosting-a-server" href="#hosting-a-server">Hosting a server</a>
        <a data-slug="payments" href="#payments">Payments</a>
        <a data-slug="comms" href="#comms">Comms</a>
        <a data-slug="dmtap" href="#dmtap">DMTAP surface</a>
        <a data-slug="screenshots" href="#screenshots">Screenshots</a>
  </aside>
  <main class="docs-main">
    <div class="docs-title" id="crumb"></div>
    <article class="markdown" id="content">Loading…</article>
  </main>
</div>
<footer class="site-footer"><div class="wrap foot">
    <div class="left"><img src="./assets/vulos-logo.png" alt="Vulos"> <span>Part of <a href="https://vulos.org" target="_blank" rel="noopener" style="color:var(--text)">Vulos</a> — the open, self-hostable web OS &amp; app suite.</span></div>
    <div class="links">
      <a href="./docs.html">Docs</a>
      <a href="https://github.com/vul-os/magnetite" target="_blank" rel="noopener">GitHub</a>
      <a href="./LICENSE.txt">License</a>
      <a href="https://vulos.org" target="_blank" rel="noopener">vulos.org</a>
    </div>
  </div></footer>
<script>
const DOCS = [{"slug":"overview","title":"Overview"},{"slug":"getting-started","title":"Getting started"},{"slug":"architecture","title":"Architecture"},{"slug":"hosting-a-server","title":"Hosting a server"},{"slug":"payments","title":"Payments"},{"slug":"comms","title":"Comms"},{"slug":"dmtap","title":"DMTAP surface"},{"slug":"screenshots","title":"Screenshots"}];
const bySlug = Object.fromEntries(DOCS.map(d=>[d.slug,d]));
const content = document.getElementById('content');
const crumb = document.getElementById('crumb');
let mermaidReady = false;
try { mermaid.initialize({ startOnLoad:false, theme:'dark', securityLevel:'loose', themeVariables:{ fontFamily:'var(--sans)' } }); mermaidReady = true; } catch(e){}

if (window.marked && marked.setOptions) marked.setOptions({ gfm:true, breaks:false });

function setActive(slug){
  document.querySelectorAll('.docs-nav a').forEach(a=>a.classList.toggle('active', a.dataset.slug===slug));
}

async function renderMermaid(){
  if(!mermaidReady) return;
  const blocks = [...content.querySelectorAll('code.language-mermaid')];
  blocks.forEach((code,i)=>{
    const div = document.createElement('div');
    div.className='mermaid';
    div.textContent = code.textContent;
    code.closest('pre').replaceWith(div);
  });
  const nodes = content.querySelectorAll('.mermaid');
  if(nodes.length){ try { await mermaid.run({ nodes }); } catch(e){ console.warn('mermaid', e); } }
}

async function load(slug){
  const doc = bySlug[slug] || DOCS[0];
  setActive(doc.slug);
  crumb.textContent = doc.title;
  content.innerHTML = 'Loading…';
  try {
    const res = await fetch('./docs/'+doc.slug+'.md', {cache:'no-cache'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const md = await res.text();
    content.innerHTML = marked.parse(md);
    content.querySelectorAll('img').forEach(img=>{
      const s=img.getAttribute('src')||'';
      if(/^https?:/i.test(s)) return;
      const m=s.match(/(?:\.\.\/)*(?:docs\/)?screenshots\/(.+)$/);
      if(m) img.setAttribute('src','screenshots/'+m[1]);
    });
    content.querySelectorAll('a[href^="http"]').forEach(a=>{a.target='_blank';a.rel='noopener';});
    await renderMermaid();
    window.scrollTo({top:0});
  } catch(err){
    content.innerHTML = '<div class="docs-error">Could not load <code>'+doc.slug+'.md</code> — '+err.message+'</div>';
  }
}

function current(){ return (location.hash||'').replace('#','') || DOCS[0].slug; }
window.addEventListener('hashchange', ()=>load(current()));
load(current());
</script>
</body>
</html>
