<!doctype html>
<html lang="en" data-theme="dark" data-theme-pref="system">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Magnetite docs</title>
<meta name="description" content="Magnetite documentation — architecture, hosting, payments, comms.">
<link rel="icon" href="./assets/magnetite-mark.svg">

<!-- Resolve theme before paint to avoid a flash. Preference (light|dark|system)
     lives in localStorage 'vulos-theme'; <html data-theme> holds the RESOLVED
     light|dark value. Same contract as the landing page. -->
<script>
  (function () {
    try {
      var pref = localStorage.getItem('vulos-theme') || 'system';
      var sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', pref === 'system' ? sys : pref);
      document.documentElement.setAttribute('data-theme-pref', pref);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<style>*,*::before,*::after{box-sizing:border-box}
/* Self-hosted fonts — nothing is fetched from a CDN at runtime. */
@font-face{font-family:'Space Grotesk var';src:url('./fonts/space-grotesk.woff2') format('woff2');font-weight:300 700;font-style:normal;font-display:swap}
@font-face{font-family:'Inter var';src:url('./fonts/inter.woff2') format('woff2');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono var';src:url('./fonts/jetbrains-mono.woff2') format('woff2');font-weight:100 800;font-style:normal;font-display:swap}

:root{
  --radius:16px; --max:1120px;
  --mono:'JetBrains Mono var',ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --sans:'Inter var',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --display:'Space Grotesk var','Inter var',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
/* "Lodestone" identity — cold iron (dark) / milled steel (light). Violet is the
   verifiable core; magenta (--accent-2) marks where verification stops. */
:root[data-theme="dark"]{
  color-scheme:dark;
  --bg:#0A0C11; --bg-soft:#0F1218; --panel:#0F1218; --panel-2:#14181F;
  --border:#212734; --border-2:#364052;
  --text:#E9ECF3; --muted:#98A1B3; --faint:#656D7E;
  --accent:#8B74FF; --accent-2:#FF4D9D;
}
:root[data-theme="light"]{
  color-scheme:light;
  --bg:#F1F2F7; --bg-soft:#F8F9FC; --panel:#FFFFFF; --panel-2:#F8F9FC;
  --border:#E0E3EC; --border-2:#C0C6D4;
  --text:#11141B; --muted:#4D5464; --faint:#818899;
  --accent:#5B3FE0; --accent-2:#C4006B;
}
h1,h2,h3{font-family:var(--display);letter-spacing:-.02em}
/* 3-way Light / Dark / System selector */
.theme-seg{display:inline-flex;align-items:center;gap:2px;padding:3px;background:var(--panel-2);border:1px solid var(--border);border-radius:999px}
.theme-seg button{display:grid;place-items:center;width:30px;height:28px;border:0;background:transparent;color:var(--faint);cursor:pointer;border-radius:999px;transition:color .15s,background .15s}
.theme-seg button:hover{color:var(--muted)}
.theme-seg button svg{width:16px;height:16px}
.theme-seg button[aria-pressed="true"]{background:var(--panel);color:var(--accent)}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;font-size:16px}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:
  radial-gradient(1100px 600px at 80% -10%, color-mix(in srgb,var(--accent) 20%, transparent), transparent 60%),
  radial-gradient(900px 500px at -10% 10%, color-mix(in srgb,var(--accent-2) 14%, transparent), transparent 55%),
  var(--bg);}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
.accent{color:var(--accent)}

/* Header */
.site-header{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:color-mix(in srgb,var(--bg) 72%, transparent);border-bottom:1px solid var(--border)}
.nav{display:flex;align-items:center;gap:18px;height:64px}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;letter-spacing:-.02em}
.brand .tile{width:34px;height:34px;border-radius:9px;background:var(--panel-2);display:grid;place-items:center;padding:5px;border:1px solid var(--border-2)}
.brand .tile img,.brand .tile svg{width:100%;height:100%;object-fit:contain}
.nav-spacer{flex:1}
.nav-links{display:flex;align-items:center;gap:22px}
.nav-links a{color:var(--muted);font-size:14.5px;font-weight:500;transition:color .15s}
.nav-links a:hover{color:var(--text)}
.vulos-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--border-2);border-radius:999px;font-size:13px;color:var(--muted);transition:border-color .15s,color .15s}
.vulos-badge:hover{border-color:var(--accent);color:var(--text)}
.vulos-badge img{width:16px;height:16px;border-radius:4px}
@media(max-width:760px){.nav-links{display:none}}

/* Docs viewer */
.docs-shell{display:grid;grid-template-columns:248px 1fr;gap:36px;align-items:start;padding:34px 0 70px}
@media(max-width:860px){.docs-shell{grid-template-columns:1fr}}
.docs-nav{position:sticky;top:84px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel);padding:14px}
.docs-nav .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);padding:6px 10px}
.docs-nav a{display:block;padding:8px 11px;border-radius:9px;color:var(--muted);font-size:14.5px;font-weight:500;transition:.15s}
.docs-nav a:hover{background:color-mix(in srgb,var(--text) 6%, transparent);color:var(--text)}
.docs-nav a.active{background:color-mix(in srgb,var(--accent) 16%, transparent);color:var(--text)}
@media(max-width:860px){.docs-nav{position:static}}
.docs-main{min-width:0}
.markdown{font-size:16px}
.markdown>*:first-child{margin-top:0}
.markdown h1{font-size:34px;letter-spacing:-.03em;margin:.2em 0 .5em;border-bottom:1px solid var(--border);padding-bottom:.3em}
.markdown h2{font-size:25px;letter-spacing:-.02em;margin:1.6em 0 .6em;border-bottom:1px solid var(--border);padding-bottom:.25em}
.markdown h3{font-size:19px;margin:1.4em 0 .5em}
.markdown h4{font-size:16px;margin:1.3em 0 .4em;color:var(--text)}
.markdown p,.markdown li{color:var(--muted)}
.markdown a{color:var(--accent);text-decoration:none}
.markdown a:hover{text-decoration:underline}
.markdown code{font-family:var(--mono);font-size:.88em;background:color-mix(in srgb,var(--text) 8%, transparent);padding:2px 6px;border-radius:6px}
.markdown pre{background:var(--bg-soft);border:1px solid var(--border-2);border-radius:12px;padding:16px 18px;overflow:auto}
.markdown pre code{background:none;padding:0;font-size:13.5px;line-height:1.7;color:var(--text)}
.markdown blockquote{margin:1em 0;padding:.4em 1em;border-left:3px solid var(--accent);background:color-mix(in srgb,var(--accent) 6%, transparent);color:var(--muted);border-radius:0 8px 8px 0}
.markdown table{border-collapse:collapse;width:100%;margin:1.2em 0;font-size:14.5px;display:block;overflow:auto}
.markdown th,.markdown td{border:1px solid var(--border-2);padding:9px 12px;text-align:left}
.markdown th{background:var(--panel);font-weight:600}
.markdown img{border-radius:10px;margin:1em 0;border:1px solid var(--border)}
.markdown hr{border:none;border-top:1px solid var(--border);margin:2em 0}
.markdown .mermaid{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin:1.2em 0;text-align:center;overflow:auto}
.docs-title{font-size:13px;color:var(--faint);margin-bottom:6px}
.docs-error{color:#fca5a5;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);padding:14px 16px;border-radius:10px}

/* Footer */
.site-footer{border-top:1px solid var(--border);margin-top:40px;padding:40px 0}
.foot{display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between}
.foot .left{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px}
.foot .left img{width:20px;height:20px;border-radius:5px}
.foot .links{display:flex;gap:20px;flex-wrap:wrap}
.foot .links a{color:var(--muted);font-size:14px}
.foot .links a:hover{color:var(--text)}
</style>
<script src="./assets/vendor/marked.umd.js"></script>
<script src="./assets/vendor/mermaid.min.js"></script>
</head>
<body>
<header class="site-header"><div class="wrap nav">
    <a class="brand" href="./index.html"><span class="tile"><img src="./assets/magnetite-mark.svg" alt="Magnetite logo"></span>magnetite</a>
    <div class="nav-spacer"></div>
    <nav class="nav-links">
      <a href="./index.html#status">Status</a>
      <a href="./index.html#seams">Seams</a>
      <a href="./docs.html">Docs</a>
      <a href="https://github.com/vul-os/magnetite" target="_blank" rel="noopener">GitHub</a>
    </nav>
    <div class="theme-seg" role="group" aria-label="Colour theme">
      <button type="button" data-set="light" title="Light" aria-label="Light theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <button type="button" data-set="dark" title="Dark" aria-label="Dark theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
      <button type="button" data-set="system" title="System" aria-label="Match system theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>
      </button>
    </div>
    <a class="vulos-badge" href="https://vulos.org" target="_blank" rel="noopener" title="Part of Vulos">
      <img src="./assets/vulos-logo.png" alt="Vulos">Part of Vulos
    </a>
  </div></header>
<div class="wrap docs-shell">
  <aside class="docs-nav">
    <div class="label">magnetite docs</div>
        <a data-slug="overview" href="#overview">Overview</a>
        <a data-slug="status" href="#status">Status</a>
        <a data-slug="getting-started" href="#getting-started">Getting started</a>
        <a data-slug="architecture" href="#architecture">Architecture</a>
        <a data-slug="seams" href="#seams">The seams</a>
        <a data-slug="hosting-a-server" href="#hosting-a-server">Hosting a server</a>
        <a data-slug="payments" href="#payments">Payments</a>
        <a data-slug="comms" href="#comms">Comms</a>
        <a data-slug="screenshots" href="#screenshots">Screenshots</a>
  </aside>
  <main class="docs-main">
    <div class="docs-title" id="crumb"></div>
    <article class="markdown" id="content">Loading…</article>
  </main>
</div>
<footer class="site-footer"><div class="wrap foot">
    <div class="left"><img src="./assets/vulos-logo.png" alt="Vulos"> <span>Part of <a href="https://vulos.org" target="_blank" rel="noopener" style="color:var(--text)">Vulos</a> — the open, self-hostable web OS &amp; app suite.</span></div>
    <div class="links">
      <a href="./docs.html">Docs</a>
      <a href="https://github.com/vul-os/magnetite" target="_blank" rel="noopener">GitHub</a>
      <a href="./LICENSE.txt">License</a>
      <a href="https://vulos.org" target="_blank" rel="noopener">vulos.org</a>
    </div>
  </div></footer>
<script>
const DOCS = [{"slug":"overview","title":"Overview"},{"slug":"status","title":"Status"},{"slug":"getting-started","title":"Getting started"},{"slug":"architecture","title":"Architecture"},{"slug":"seams","title":"The seams"},{"slug":"hosting-a-server","title":"Hosting a server"},{"slug":"payments","title":"Payments"},{"slug":"comms","title":"Comms"},{"slug":"screenshots","title":"Screenshots"}];
const bySlug = Object.fromEntries(DOCS.map(d=>[d.slug,d]));
const content = document.getElementById('content');
const crumb = document.getElementById('crumb');
let mermaidReady = false;
try { mermaid.initialize({ startOnLoad:false, theme: document.documentElement.getAttribute('data-theme')==='light' ? 'default' : 'dark', securityLevel:'loose', themeVariables:{ fontFamily:'var(--sans)' } }); mermaidReady = true; } catch(e){}

if (window.marked && marked.setOptions) marked.setOptions({ gfm:true, breaks:false });

function setActive(slug){
  document.querySelectorAll('.docs-nav a').forEach(a=>a.classList.toggle('active', a.dataset.slug===slug));
}

async function renderMermaid(){
  if(!mermaidReady) return;
  const blocks = [...content.querySelectorAll('code.language-mermaid')];
  blocks.forEach((code,i)=>{
    const div = document.createElement('div');
    div.className='mermaid';
    div.textContent = code.textContent;
    code.closest('pre').replaceWith(div);
  });
  const nodes = content.querySelectorAll('.mermaid');
  if(nodes.length){ try { await mermaid.run({ nodes }); } catch(e){ console.warn('mermaid', e); } }
}

async function load(slug){
  const doc = bySlug[slug] || DOCS[0];
  setActive(doc.slug);
  crumb.textContent = doc.title;
  content.innerHTML = 'Loading…';
  try {
    const res = await fetch('./docs/'+doc.slug+'.md', {cache:'no-cache'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const md = await res.text();
    content.innerHTML = marked.parse(md);
    content.querySelectorAll('img').forEach(img=>{
      const s=img.getAttribute('src')||'';
      if(/^https?:/i.test(s)) return;
      const m=s.match(/(?:\.\.\/)*(?:docs\/)?screenshots\/(.+)$/);
      if(m) img.setAttribute('src','screenshots/'+m[1]);
    });
    content.querySelectorAll('a[href^="http"]').forEach(a=>{a.target='_blank';a.rel='noopener';});
    await renderMermaid();
    window.scrollTo({top:0});
  } catch(err){
    content.innerHTML = '<div class="docs-error">Could not load <code>'+doc.slug+'.md</code> — '+err.message+'</div>';
  }
}

function current(){ return (location.hash||'').replace('#','') || DOCS[0].slug; }
window.addEventListener('hashchange', ()=>load(current()));
load(current());
</script>
<script>
  /* Light / Dark / System selector — same localStorage contract as the landing. */
  (function () {
    var root = document.documentElement;
    var mql = window.matchMedia('(prefers-color-scheme: dark)');
    function resolve(p){ return p === 'system' ? (mql.matches ? 'dark' : 'light') : p; }
    function currentPref(){ try { return localStorage.getItem('vulos-theme') || 'system'; } catch(e){ return 'system'; } }
    function apply(pref){
      root.setAttribute('data-theme', resolve(pref));
      root.setAttribute('data-theme-pref', pref);
      document.querySelectorAll('.theme-seg button').forEach(function(b){
        b.setAttribute('aria-pressed', String(b.dataset.set === pref));
      });
    }
    document.querySelectorAll('.theme-seg button').forEach(function(b){
      b.addEventListener('click', function(){
        var pref = b.dataset.set;
        try { localStorage.setItem('vulos-theme', pref); } catch(e){}
        apply(pref);
      });
    });
    mql.addEventListener('change', function(){ if (currentPref() === 'system') apply('system'); });
    apply(currentPref());
  })();
</script>
</body>
</html>
