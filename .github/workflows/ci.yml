name: CI
on: [push, pull_request]
jobs:
  rust:
    runs-on: ubuntu-latest
    # The backend crate lives in backend/ (there is no root Cargo.toml), so
    # every cargo step must run from there.
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo build --tests
      - run: cargo test
      - run: cargo clippy -- -D warnings
  
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      # The unit/integration suite and the axe a11y suite run under separate
      # vitest configs (the default config excludes *.a11y.test.jsx); both must
      # run or a whole tranche of tests gates nothing.
      - run: npm run test:run
      - run: npm run test:a11y
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # The Playwright config's webServer starts `npm run dev` itself (fresh in
      # CI), and every spec stubs its own API, so no backend is needed. The
      # game-studio spec is excluded via testIgnore pending a rewrite.
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
