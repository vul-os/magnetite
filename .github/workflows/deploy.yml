name: Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-musl
      - uses: taiki-e/upload-rust-binary@v1
        with:
          bin: magnetite-backend
          target: x86_64-unknown-linux-musl
          token: ${{ secrets.FLY_API_TOKEN }}
      - name: Run migrations
        run: |
          fly ssh console -C "magnetite migrate"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy backend
        run: |
          fly deploy --app magnetite-backend --config Dockerfile.backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Health check backend
        run: |
          for i in {1..30}; do
            if curl -sf http://magnetite-backend.fly.dev/health; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Waiting for backend health..."
            sleep 2
          done
          echo "Backend health check failed"
          exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy frontend
        run: |
          fly deploy --app magnetite-frontend --config Dockerfile.frontend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Health check frontend
        run: |
          for i in {1..30}; do
            if curl -sf http://magnetite-frontend.fly.dev/health; then
              echo "Frontend healthy"
              exit 0
            fi
            echo "Waiting for frontend health..."
            sleep 2
          done
          echo "Frontend health check failed"
          exit 1
