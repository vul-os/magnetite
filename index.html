<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07080C" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="Magnetite — the open-source platform for building, distributing, and monetizing Rust games at any scale." />

    <!-- Social preview card. Text-only (summary): no dedicated OG image asset
         ships, so a shared link renders title + description over the favicon. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Magnetite" />
    <meta property="og:title" content="Magnetite — Rust Games Platform" />
    <meta property="og:description" content="The open-source platform for building, distributing, and monetizing Rust games at any scale." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Magnetite — Rust Games Platform" />
    <meta name="twitter:description" content="The open-source platform for building, distributing, and monetizing Rust games at any scale." />

    <!--
      Type system — self-hosted, no CDN. All faces SIL OFL-1.1 (public/fonts/OFL.txt).
        Display : Instrument Serif  (400 only)
        Sans    : IBM Plex Sans     (variable 100–700)
        Mono    : IBM Plex Mono     (400 / 600)
      @font-face declarations live in src/styles/tokens.css. The two faces
      below are preloaded because they paint above the fold on every route.
    -->
    <link rel="preload" href="/fonts/ibm-plex-sans-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/ibm-plex-mono-400.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Set the theme before first paint so the page never flashes the wrong one. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('theme') || 'dark';
          var t = p === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : p;
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <title>Magnetite — Rust Games Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
